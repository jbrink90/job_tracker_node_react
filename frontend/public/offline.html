<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Offline - JobTrackr</title>
    <style>
        body {
            margin: 0 auto;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background-color: #f5f5f5;
        }
        
        .reactTrackerPage_main {
            margin: 0 auto;
            max-width: 50%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }
        
        .offline-card {
            max-width: 400px;
            width: 100%;
            margin: 40px auto;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            background-color: #ffffff;
            text-align: center;
        }
        
        .offline-title {
            margin-bottom: 10px;
            font-weight: 700;
            color: #333;
            font-size: 1.5rem;
        }
        
        .offline-message {
            margin-bottom: 20px;
            color: #666;
            line-height: 1.5;
        }
        
        .offline-icon {
            font-size: 3rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        .retry-button {
            background-color: #1976d2;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        .retry-button:hover {
            background-color: #1565c0;
        }
        
        .page-footer {
            margin-top: 40px;
            text-align: center;
            color: #666;
            font-size: 0.875rem;
        }
        a {
            color: #1565c0;
            text-decoration: none;
        }
        a:hover {
            color: #333;
        }
        a:visited {
            color: #1565c0;
        }
        a:visited:hover {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="reactTrackerPage_main">
        <div class="offline-card">
            <div class="offline-icon">📡</div>
            <h2 class="offline-title">Hey! We're offline!</h2>
            <p class="offline-message">
                It looks like you've lost your internet connection. 
                Please check your connection and try again.
            </p>
            <button class="retry-button" onclick="window.location.reload()">
                Try Again
            </button>
        </div>
        <div class="page-footer">
            <a href="/"><p>JobTrackr.online - Track your job applications with ease</p></a>
        </div>
    </div>
</body>
</html>
